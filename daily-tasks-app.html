<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Tasks</title>
  <style>
    :root {
      --sky: #dceeff;
      --sand: #f5ead7;
      --ink: #1e293b;
      --muted: #64748b;
      --panel: rgba(255, 252, 247, 0.84);
      --line: rgba(30, 41, 59, 0.12);
      --accent: #d97706;
      --accent-deep: #9a3412;
      --success: #15803d;
      --danger: #b91c1c;
      --shadow: 0 22px 60px rgba(30, 41, 59, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Georgia, "Times New Roman", serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.85), transparent 30%),
        radial-gradient(circle at bottom right, rgba(217, 119, 6, 0.12), transparent 24%),
        linear-gradient(135deg, var(--sand), var(--sky));
    }

    .shell {
      width: min(1080px, calc(100% - 32px));
      margin: 32px auto;
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 24px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid rgba(255, 255, 255, 0.65);
      border-radius: 28px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .sidebar {
      padding: 28px;
      position: sticky;
      top: 24px;
      align-self: start;
      overflow: hidden;
    }

    .sidebar::after {
      content: "";
      position: absolute;
      inset: auto -40px -50px auto;
      width: 150px;
      height: 150px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(217, 119, 6, 0.18), transparent 65%);
    }

    .eyebrow {
      margin: 0 0 10px;
      font-size: 0.8rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--accent-deep);
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 4vw, 3rem);
      line-height: 0.98;
    }

    .subtitle {
      margin: 16px 0 26px;
      color: var(--muted);
      line-height: 1.6;
      font-size: 1rem;
    }

    .stats {
      display: grid;
      gap: 14px;
      margin-bottom: 24px;
    }

    .stat {
      padding: 16px 18px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.58);
      border: 1px solid rgba(255, 255, 255, 0.7);
    }

    .stat strong,
    .progress-number {
      display: block;
      font-size: 1.9rem;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .progress-wrap {
      margin-top: 8px;
    }

    .progress-bar {
      height: 12px;
      width: 100%;
      border-radius: 999px;
      background: rgba(30, 41, 59, 0.08);
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--accent), #f59e0b);
      transition: width 240ms ease;
    }

    .date-chip {
      display: inline-flex;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.62);
      color: var(--accent-deep);
      font-size: 0.95rem;
      border: 1px solid rgba(255, 255, 255, 0.72);
    }

    .main {
      padding: 28px;
    }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 16px;
      align-items: start;
      margin-bottom: 22px;
    }

    .task-form {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 160px auto;
      gap: 12px;
    }

    input,
    select,
    button {
      font: inherit;
    }

    input,
    select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px 16px;
      background: rgba(255, 255, 255, 0.88);
      color: var(--ink);
      outline: none;
      transition: border-color 180ms ease, box-shadow 180ms ease, transform 180ms ease;
    }

    input:focus,
    select:focus {
      border-color: rgba(217, 119, 6, 0.55);
      box-shadow: 0 0 0 4px rgba(217, 119, 6, 0.12);
      transform: translateY(-1px);
    }

    button {
      border: 0;
      border-radius: 16px;
      padding: 14px 18px;
      cursor: pointer;
      transition: transform 180ms ease, opacity 180ms ease, box-shadow 180ms ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    .primary {
      background: linear-gradient(135deg, var(--accent), #f59e0b);
      color: #fff;
      box-shadow: 0 12px 24px rgba(217, 119, 6, 0.24);
    }

    .secondary {
      background: rgba(255, 255, 255, 0.82);
      color: var(--ink);
      border: 1px solid var(--line);
    }

    .filters {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .filter-btn.active {
      background: var(--ink);
      color: #fff;
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin: 18px 0 14px;
    }

    .section-head h2 {
      margin: 0;
      font-size: 1.4rem;
    }

    .task-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: grid;
      gap: 14px;
    }

    .task-item {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 14px;
      align-items: center;
      padding: 16px;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.78);
      border: 1px solid rgba(255, 255, 255, 0.82);
      box-shadow: 0 14px 30px rgba(15, 23, 42, 0.08);
      transform-origin: center;
      animation: fadeIn 260ms ease;
    }

    .task-item.done .task-title {
      text-decoration: line-through;
      color: var(--muted);
    }

    .task-item.done .priority {
      opacity: 0.6;
    }

    .check {
      width: 22px;
      height: 22px;
      appearance: none;
      margin: 0;
      border-radius: 50%;
      border: 2px solid rgba(217, 119, 6, 0.45);
      display: grid;
      place-items: center;
      background: #fff;
      cursor: pointer;
    }

    .check:checked {
      background: var(--success);
      border-color: var(--success);
    }

    .check:checked::after {
      content: "";
      width: 6px;
      height: 10px;
      border-right: 2px solid #fff;
      border-bottom: 2px solid #fff;
      transform: rotate(45deg) translate(-1px, -1px);
    }

    .task-title {
      margin: 0 0 6px;
      font-size: 1.08rem;
    }

    .meta {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .priority {
      display: inline-flex;
      align-items: center;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(217, 119, 6, 0.12);
      color: var(--accent-deep);
    }

    .actions {
      display: flex;
      gap: 8px;
    }

    .icon-btn {
      min-width: 42px;
      padding: 11px 12px;
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid var(--line);
    }

    .icon-btn.delete {
      color: var(--danger);
    }

    .empty {
      padding: 28px 20px;
      border: 1px dashed rgba(30, 41, 59, 0.18);
      border-radius: 22px;
      color: var(--muted);
      text-align: center;
      background: rgba(255, 255, 255, 0.52);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(8px) scale(0.98);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @media (max-width: 900px) {
      .shell {
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: static;
      }

      .toolbar,
      .task-form {
        grid-template-columns: 1fr;
      }

      .filters {
        justify-content: flex-start;
      }
    }

    @media (max-width: 560px) {
      .main,
      .sidebar {
        padding: 20px;
      }

      .task-item {
        grid-template-columns: auto 1fr;
      }

      .actions {
        grid-column: 1 / -1;
        justify-content: flex-end;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <aside class="sidebar panel">
      <p class="eyebrow">Daily Focus</p>
      <h1>Task Journal</h1>
      <p class="subtitle">Plan your day, finish what matters, and keep your routine clear without extra clutter.</p>

      <div class="stats">
        <div class="stat">
          <strong id="totalCount">0</strong>
          <span>Total tasks</span>
        </div>
        <div class="stat">
          <strong id="doneCount">0</strong>
          <span>Completed today</span>
        </div>
        <div class="stat progress-wrap">
          <span class="progress-number" id="progressText">0%</span>
          <span>Daily progress</span>
          <div class="progress-bar" aria-hidden="true">
            <div class="progress-fill" id="progressFill"></div>
          </div>
        </div>
      </div>

      <div class="date-chip" id="todayLabel"></div>
    </aside>

    <main class="main panel">
      <div class="toolbar">
        <form class="task-form" id="taskForm">
          <input id="taskInput" type="text" placeholder="Add a task for today..." maxlength="120" required>
          <select id="prioritySelect" aria-label="Task priority">
            <option value="Low">Low priority</option>
            <option value="Medium" selected>Medium priority</option>
            <option value="High">High priority</option>
          </select>
          <button class="primary" type="submit">Add Task</button>
        </form>

        <div class="filters" aria-label="Task filters">
          <button class="secondary filter-btn active" type="button" data-filter="all">All</button>
          <button class="secondary filter-btn" type="button" data-filter="active">Active</button>
          <button class="secondary filter-btn" type="button" data-filter="done">Done</button>
        </div>
      </div>

      <div class="section-head">
        <h2>Your Tasks</h2>
        <button class="secondary" id="clearCompletedBtn" type="button">Clear Completed</button>
      </div>

      <ul class="task-list" id="taskList"></ul>
    </main>
  </div>

  <script>
    const STORAGE_KEY = "daily-tasks-app-items";
    const form = document.getElementById("taskForm");
    const taskInput = document.getElementById("taskInput");
    const prioritySelect = document.getElementById("prioritySelect");
    const taskList = document.getElementById("taskList");
    const totalCount = document.getElementById("totalCount");
    const doneCount = document.getElementById("doneCount");
    const progressText = document.getElementById("progressText");
    const progressFill = document.getElementById("progressFill");
    const todayLabel = document.getElementById("todayLabel");
    const clearCompletedBtn = document.getElementById("clearCompletedBtn");
    const filterButtons = Array.from(document.querySelectorAll(".filter-btn"));

    let currentFilter = "all";
    let tasks = loadTasks();

    todayLabel.textContent = new Intl.DateTimeFormat("en-US", {
      weekday: "long",
      month: "long",
      day: "numeric",
      year: "numeric"
    }).format(new Date());

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      const title = taskInput.value.trim();

      if (!title) {
        taskInput.focus();
        return;
      }

      tasks.unshift({
        id: crypto.randomUUID(),
        title,
        priority: prioritySelect.value,
        done: false,
        createdAt: new Date().toISOString()
      });

      saveTasks();
      taskInput.value = "";
      prioritySelect.value = "Medium";
      taskInput.focus();
      render();
    });

    taskList.addEventListener("click", (event) => {
      const target = event.target;
      const item = target.closest("[data-id]");

      if (!item) {
        return;
      }

      const taskId = item.dataset.id;

      if (target.matches(".delete")) {
        tasks = tasks.filter((task) => task.id !== taskId);
        saveTasks();
        render();
      }
    });

    taskList.addEventListener("change", (event) => {
      const target = event.target;
      if (!target.matches(".check")) {
        return;
      }

      const item = target.closest("[data-id]");
      const task = tasks.find((entry) => entry.id === item.dataset.id);

      if (!task) {
        return;
      }

      task.done = target.checked;
      saveTasks();
      render();
    });

    clearCompletedBtn.addEventListener("click", () => {
      tasks = tasks.filter((task) => !task.done);
      saveTasks();
      render();
    });

    filterButtons.forEach((button) => {
      button.addEventListener("click", () => {
        currentFilter = button.dataset.filter;
        filterButtons.forEach((entry) => entry.classList.toggle("active", entry === button));
        render();
      });
    });

    function loadTasks() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
      } catch (error) {
        return [];
      }
    }

    function saveTasks() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
    }

    function getVisibleTasks() {
      if (currentFilter === "active") {
        return tasks.filter((task) => !task.done);
      }

      if (currentFilter === "done") {
        return tasks.filter((task) => task.done);
      }

      return tasks;
    }

    function formatTime(value) {
      return new Intl.DateTimeFormat("en-US", {
        hour: "numeric",
        minute: "2-digit"
      }).format(new Date(value));
    }

    function render() {
      const visibleTasks = getVisibleTasks();
      const completed = tasks.filter((task) => task.done).length;
      const progress = tasks.length ? Math.round((completed / tasks.length) * 100) : 0;

      totalCount.textContent = String(tasks.length);
      doneCount.textContent = String(completed);
      progressText.textContent = `${progress}%`;
      progressFill.style.width = `${progress}%`;

      if (!visibleTasks.length) {
        const message = tasks.length
          ? "No tasks in this view right now."
          : "Your list is empty. Add a few tasks to start your day.";

        taskList.innerHTML = `<li class="empty">${message}</li>`;
        return;
      }

      taskList.innerHTML = visibleTasks.map((task) => `
        <li class="task-item ${task.done ? "done" : ""}" data-id="${task.id}">
          <input class="check" type="checkbox" ${task.done ? "checked" : ""} aria-label="Mark ${escapeHtml(task.title)} as complete">
          <div>
            <p class="task-title">${escapeHtml(task.title)}</p>
            <div class="meta">
              <span class="priority">${escapeHtml(task.priority)}</span>
              <span>Added ${formatTime(task.createdAt)}</span>
            </div>
          </div>
          <div class="actions">
            <button class="icon-btn delete" type="button" aria-label="Delete ${escapeHtml(task.title)}">Delete</button>
          </div>
        </li>
      `).join("");
    }

    function escapeHtml(value) {
      return value
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    render();
  </script>
</body>
</html>
